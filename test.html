<div class="container">

    <h2>Login API Test</h2>

    <input
        type="email"
        id="email"
        placeholder="Enter Email"
    >

    <input
        type="password"
        id="password"
        placeholder="Enter Password"
    >

    <button onclick="login()">
        Login
    </button>

    <pre id="output"></pre>

</div>

<script>

    async function login() {

        const output =
            document.getElementById("output");

        const email =
            document.getElementById("email").value;

        const password =
            document.getElementById("password").value;

        // Validation
        if (!email || !password) {

            output.className = "error";

            output.innerHTML =
                "Email and Password are required";

            return;
        }

        output.className = "loading";

        output.innerHTML = "Loading...";

        try {

            const response = await fetch(
                "https://e225-2402-8100-2770-ba84-db2c-9faf-6bcf-f5a4.ngrok-free.app/backend/api/admin/login.php",
                {
                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                }
            );

            const data = await response.json();

            console.log(data);

            if (data.success) {

                output.className = "success";

            } else {

                output.className = "error";
            }

            output.innerHTML =
                JSON.stringify(data, null, 4);

        } catch (error) {

            console.log(error);

            output.className = "error";

            output.innerHTML =
                "Error: " + error.message;
        }
    }

</script>
